              <br/>

                eventually led to me landing my first fulltime software developer position as a backend developer. 
                Since then, I have gained a vast amount of experience in software development, concepts, and best 
                practices. 
              <br/>
              <br/>
                The infinite possibilities, opportunity for creativity, and evergrowing depth of software is
